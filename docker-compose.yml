services:
  tunnel-server:
    build: .
    container_name: go-tunnel-server
    restart: unless-stopped
    ports:
      - "${TUNNEL_PORT:-8080}:8080"
    environment:
      - TUNNEL_ADDR=:8080
      - TUNNEL_DOMAIN=${TUNNEL_DOMAIN:?Please set TUNNEL_DOMAIN in .env}
    networks:
      - tunnel-net

networks:
  tunnel-net:
    driver: bridge
