name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.env*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            target: server
            output: go-tunnel-server-linux-amd64
          - goos: darwin
            goarch: arm64
            target: client
            output: tunnel-client-darwin-arm64
          - goos: windows
            goarch: amd64
            target: client
            output: tunnel-client-windows-amd64.exe

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build ${{ matrix.output }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          if [ "${{ matrix.target }}" = "server" ]; then
            go build -ldflags="-s -w" -o bin/${{ matrix.output }} ./cmd/server
          else
            go build -ldflags="-s -w" -o bin/${{ matrix.output }} ./cmd/client
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: bin/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -lhR artifacts

      # 取消注释下面的配置，推 tag 时自动发布 Release
      # if: startsWith(github.ref, 'refs/tags/v')
