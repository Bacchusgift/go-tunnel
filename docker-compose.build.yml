# 备选：使用多阶段构建（Docker 内编译）
# 用法: docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
services:
  tunnel-server:
    build:
      context: .
      dockerfile: Dockerfile.build
    container_name: go-tunnel-server
    restart: unless-stopped
    ports:
      - "${TUNNEL_PORT:-8080}:8080"
    environment:
      - TUNNEL_ADDR=:8080
      - TUNNEL_DOMAIN=${TUNNEL_DOMAIN:?Please set TUNNEL_DOMAIN in .env}
    networks:
      - tunnel-net

networks:
  tunnel-net:
    driver: bridge
